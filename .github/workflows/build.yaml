name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

on:
  push:
    branches:
      - main

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Install Node.js
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Adjust if needed

      - name: Install npm packages
        run: npm install

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Debug: List project files to verify structure
      - name: List project files
        run: ls -la

      # Ensure the .vercel directory exists locally before pulling the environment info
      - name: Check for .vercel directory
        run: |
          if [ ! -d ".vercel" ]; then
            echo ".vercel directory does not exist, creating it..."
            mkdir .vercel
          fi
          ls -la .vercel

      # Pull Vercel environment information (debug added)
      - name: Vercel Pull
        run: vercel pull --yes --environment=production --org-id=${{ secrets.VERCEL_ORG_ID }} --project-id=${{ secrets.VERCEL_PROJECT_ID }} --token=${{ secrets.VERCEL_TOKEN }} || exit 1

      # Build the project
      - name: Build Project Artifacts
        run: npm run build # Assuming there's a "build" script in package.json

      # Deploy to Vercel
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
