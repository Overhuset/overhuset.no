name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Verify Environment Variables
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN is not set"; else echo "VERCEL_TOKEN is set"; fi
          if [ -z "$VERCEL_ORG_ID" ]; then echo "VERCEL_ORG_ID is not set"; else echo "VERCEL_ORG_ID is set"; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "VERCEL_PROJECT_ID is not set"; else echo "VERCEL_PROJECT_ID is set"; fi

      - name: Link Vercel Project
        run: vercel link --token $VERCEL_TOKEN --org-id $VERCEL_ORG_ID --project-id $VERCEL_PROJECT_ID

      - name: Pull Vercel Environment Variables
        run: vercel env pull .env -y --token $VERCEL_TOKEN

      - name: Build project
        run: npm run build

      - name: Deploy to Vercel
        run: vercel --prod --token $VERCEL_TOKEN
